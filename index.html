<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Norsk AI-detektor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link data-trunk rel="css" href="styles.css">
  <script type="module">
    import {
      AutoTokenizer,
      AutoModelForSequenceClassification,
      env,
    } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";

    env.allowLocalModels = false;
    env.useBrowserCache = true;

    const MODEL_ID = "pegesund/norwegian-ai-detector";
    let tokenizer = null;
    let model = null;

    async function loadModel(progressCallback) {
      // transformers.js events: {status, name, file, progress?, loaded?, total?}
      // Statuser: 'initiate', 'download', 'progress', 'done', 'ready'
      const cb = (info) => {
        console.log("[load progress]", info);
        if (typeof progressCallback === "function") {
          try { progressCallback(info); } catch (e) { console.error(e); }
        }
      };
      const opts = {
        progress_callback: cb,
        dtype: "fp16",
      };
      tokenizer = await AutoTokenizer.from_pretrained(MODEL_ID, opts);
      model = await AutoModelForSequenceClassification.from_pretrained(MODEL_ID, opts);
    }

    function cleanText(text) {
      let t = text;
      // Decode HTML entities (basic)
      const tmp = document.createElement('textarea');
      tmp.innerHTML = t;
      t = tmp.value;
      // Wiki templates {{...}}
      t = t.replace(/\{\{[^{}]*\}\}/g, '');
      // Short {...}
      t = t.replace(/\{[^{}\n]{0,80}\}/g, '');
      // Wiki links [[X|Y]] -> Y, [[X]] -> X
      t = t.replace(/\[\[([^\[\]|]*\|)?([^\[\]]+)\]\]/g, '$2');
      // Short [...] (refs)
      t = t.replace(/\[[^\[\]\n]{0,40}\]/g, '');
      // HTML tags
      t = t.replace(/<[^<>]+>/g, '');
      // Wiki headers ==..==
      t = t.replace(/={2,}[^=\n]+={2,}/g, '');
      // Markdown bold/italic
      t = t.replace(/\*{1,3}([^\*\n]+)\*{1,3}/g, '$1');
      // Markdown headers
      t = t.replace(/^#{1,6}\s+/gm, '');
      // Markdown bullets
      t = t.replace(/^\s*[\*\-\+]\s+/gm, '');
      // Quotes -> strip (all variants: latin, smart, cyrillic-style, etc)
      t = t.replace(/[«»“-‟‘-‛ʼ-ʽʹ-ʻ′´`"']/g, '');
      // Dashes -> '-'
      t = t.replace(/[‐-―−]/g, '-');
      // Ellipsis -> '...'
      t = t.replace(/…/g, '...');
      // Repeated punct runs (2+ same special-char) -> single
      t = t.replace(/([^\w\s]|_)\1+/g, '$1');
      // Decorative + invisible chars in one big strip class
      t = t.replace(
        new RegExp(
          '[' +
            '\\u00AD' +                  // soft hyphen
            '\\u00A7' +                  // section sign §
            '\\u00B7' +                  // middle dot ·
            '\\u200B-\\u200F' +          // zero-width + RTL/LTR markers
            '\\u2028-\\u202F' +          // line/para separators, narrow no-break, etc
            '\\u2060-\\u206F' +          // word joiner + invisible
            '\\uFEFF' +                  // BOM
            '\\u2020-\\u2027' +          // daggers, bullets
            '\\u2030-\\u205E' +          // permille, prime, etc
            '\\u2190-\\u21FF' +          // arrows
            '\\u2200-\\u22FF' +          // math operators
            '\\u2300-\\u23FF' +          // misc technical
            '\\u2500-\\u257F' +          // box drawings
            '\\u2580-\\u259F' +          // block elements
            '\\u25A0-\\u25FF' +          // geometric shapes (bullets etc)
            '\\u2600-\\u26FF' +          // misc symbols (heart, star, etc)
            '\\u2700-\\u27BF' +          // dingbats
            '\\u2B00-\\u2BFF' +          // supplemental arrows
            '\\u3000' +                  // ideographic space
            ']',
          'g'
        ),
        ''
      );
      // Emoji-blokker U+1F000-U+1FAFF
      t = t.replace(/[\u{1F000}-\u{1FAFF}]/gu, '');
      // Collapse whitespace
      t = t.replace(/\s+/g, ' ').trim();
      return t;
    }

    async function predict(text) {
      const cleaned = cleanText(text);
      const inputs = await tokenizer(cleaned, {
        truncation: true,
        max_length: 1024,
        padding: false,
        return_tensors: "pt",
      });
      const out = await model(inputs);
      const logits = out.logits.data;  // Float32Array, [1, 2]
      const m = Math.max(logits[0], logits[1]);
      const e0 = Math.exp(logits[0] - m);
      const e1 = Math.exp(logits[1] - m);
      const sum = e0 + e1;
      return {
        p_human: e0 / sum,
        p_ai: e1 / sum,
        cleaned_chars: cleaned.length,
      };
    }

    window.naiDetector = { loadModel, predict, cleanText };
  </script>
</head>
<body>
</body>
</html>
