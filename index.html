<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Norsk AI-detektor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link data-trunk rel="css" href="styles.css">
  <!-- onnxruntime-web som global (CommonJS-bundle for browser) -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
  <script type="module">
    import { AutoTokenizer } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0";

    const MODEL_REPO = "pegesund/norwegian-ai-detector";
    const MODEL_URL = `https://huggingface.co/${MODEL_REPO}/resolve/main/onnx/detector_fp16.onnx`;
    const WASM_BASE = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/";

    let tokenizer = null;
    let session = null;

    async function fetchOnnxWithProgress(url, progressCb) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`fetch ${url} -> ${resp.status}`);
      const total = parseInt(resp.headers.get("content-length") || "0", 10);
      const reader = resp.body.getReader();
      const chunks = [];
      let loaded = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        if (progressCb) {
          progressCb({
            status: "progress",
            file: "detector_fp16.onnx",
            loaded, total,
            progress: total ? (100 * loaded) / total : 0,
          });
        }
      }
      const buf = new Uint8Array(loaded);
      let off = 0;
      for (const c of chunks) { buf.set(c, off); off += c.length; }
      return buf;
    }

    async function loadModel(progressCallback) {
      const cb = (info) => {
        console.log("[load progress]", info);
        if (typeof progressCallback === "function") {
          try { progressCallback(info); } catch (e) { console.error(e); }
        }
      };

      // Tokenizer via transformers.js (standard, støtter PreTrainedTokenizerFast)
      tokenizer = await AutoTokenizer.from_pretrained(MODEL_REPO, {
        progress_callback: cb,
      });

      // ONNX-modell via onnxruntime-web direkte
      ort.env.wasm.wasmPaths = WASM_BASE;
      const onnxBytes = await fetchOnnxWithProgress(MODEL_URL, cb);
      cb({ status: "ready", file: "detector_fp16.onnx" });
      // webgpu har native fp16-støtte; fall tilbake til wasm hvis ikke tilgjengelig
      session = await ort.InferenceSession.create(onnxBytes, {
        executionProviders: ["webgpu", "wasm"],
      });
    }

    function cleanText(text) {
      let t = text;
      const tmp = document.createElement('textarea');
      tmp.innerHTML = t;
      t = tmp.value;
      t = t.replace(/\{\{[^{}]*\}\}/g, '');
      t = t.replace(/\{[^{}\n]{0,80}\}/g, '');
      t = t.replace(/\[\[([^\[\]|]*\|)?([^\[\]]+)\]\]/g, '$2');
      t = t.replace(/\[[^\[\]\n]{0,40}\]/g, '');
      t = t.replace(/<[^<>]+>/g, '');
      t = t.replace(/={2,}[^=\n]+={2,}/g, '');
      t = t.replace(/\*{1,3}([^\*\n]+)\*{1,3}/g, '$1');
      t = t.replace(/^#{1,6}\s+/gm, '');
      t = t.replace(/^\s*[\*\-\+]\s+/gm, '');
      t = t.replace(/[«»“-‟‘-‛ʼ-ʽʹ-ʻ′´`"']/g, '');
      t = t.replace(/[‐-―−]/g, '-');
      t = t.replace(/…/g, '...');
      t = t.replace(/([^\w\s]|_)\1+/g, '$1');
      t = t.replace(
        new RegExp(
          '[' +
            '\\u00AD\\u00A7\\u00B7' +
            '\\u200B-\\u200F\\u2028-\\u202F\\u2060-\\u206F\\uFEFF' +
            '\\u2020-\\u2027\\u2030-\\u205E' +
            '\\u2190-\\u21FF\\u2200-\\u22FF\\u2300-\\u23FF' +
            '\\u2500-\\u257F\\u2580-\\u259F\\u25A0-\\u25FF' +
            '\\u2600-\\u26FF\\u2700-\\u27BF\\u2B00-\\u2BFF\\u3000' +
          ']',
          'g'
        ),
        ''
      );
      t = t.replace(/[\u{1F000}-\u{1FAFF}]/gu, '');
      t = t.replace(/\s+/g, ' ').trim();
      return t;
    }

    // Konverter fp16 raw bits (Uint16) til fp32 number
    function fp16ToFp32(u16) {
      const sign = (u16 >> 15) & 0x1;
      const exp = (u16 >> 10) & 0x1f;
      const frac = u16 & 0x3ff;
      if (exp === 0) {
        if (frac === 0) return sign ? -0 : 0;
        return (sign ? -1 : 1) * Math.pow(2, -14) * (frac / 1024);
      }
      if (exp === 31) {
        return frac ? NaN : (sign ? -Infinity : Infinity);
      }
      return (sign ? -1 : 1) * Math.pow(2, exp - 15) * (1 + frac / 1024);
    }

    function logitToNumber(v) {
      // ort kan returnere Float32Array (vanlig) eller Uint16Array (fp16-output uten Float16Array-støtte)
      if (typeof v === "number") return v;
      if (typeof v === "bigint") return Number(v);
      return v;
    }

    async function predict(text) {
      const cleaned = cleanText(text);
      // Tokenize — transformers.js returnerer Tensor-objekter med .data
      const enc = await tokenizer(cleaned, {
        truncation: true,
        max_length: 1024,
      });
      const idsData = enc.input_ids.data;       // BigInt64Array
      const maskData = enc.attention_mask.data; // BigInt64Array
      const seqLen = idsData.length;

      // Sørg for BigInt64Array (ort krever det for int64)
      const ids = idsData instanceof BigInt64Array
        ? idsData
        : BigInt64Array.from(Array.from(idsData).map(BigInt));
      const mask = maskData instanceof BigInt64Array
        ? maskData
        : BigInt64Array.from(Array.from(maskData).map(BigInt));

      const inputs = {
        input_ids: new ort.Tensor("int64", ids, [1, seqLen]),
        attention_mask: new ort.Tensor("int64", mask, [1, seqLen]),
      };

      const out = await session.run(inputs);
      const raw = out.logits.data;  // Float32Array, Float16Array eller Uint16Array
      let v0, v1;
      if (raw instanceof Uint16Array) {
        v0 = fp16ToFp32(raw[0]);
        v1 = fp16ToFp32(raw[1]);
      } else {
        v0 = logitToNumber(raw[0]);
        v1 = logitToNumber(raw[1]);
      }
      const m = Math.max(v0, v1);
      const e0 = Math.exp(v0 - m);
      const e1 = Math.exp(v1 - m);
      const sum = e0 + e1;
      return {
        p_human: e0 / sum,
        p_ai: e1 / sum,
        cleaned_chars: cleaned.length,
      };
    }

    window.naiDetector = { loadModel, predict, cleanText };
  </script>
</head>
<body>
</body>
</html>
