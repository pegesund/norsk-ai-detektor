name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  TRUNK_VERSION: "v0.21.14"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo + target (Rust-aware)
        uses: Swatinem/rust-cache@v2

      - name: Install trunk (prebuilt binary)
        run: |
          curl -L \
            "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
          trunk --version

      - name: Build site
        run: trunk build --release --public-url "/norsk-ai-detektor/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
